<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid's Trends POS - Data Safety Stress Test (with 5,000 Bills)</title>
    <style>
        :root {
            --bg-color: #080c14;
            --card-bg: #101622;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;
            --border: #1e293b;
            --text: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            padding: 40px 24px;
            max-width: 950px;
            margin: 0 auto;
            line-height: 1.5;
        }

        h1 {
            color: var(--text);
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 32px;
            font-size: 1.1rem;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px var(--primary-glow);
            display: inline-block;
            margin: 0 8px 24px 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .button-group {
            text-align: center;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .status-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-box {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .stat-val.success { color: var(--success); }
        .stat-val.error { color: var(--error); }
        .stat-val.warning { color: var(--warning); }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar-container {
            background-color: var(--border);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 24px;
            position: relative;
        }

        .progress-bar {
            background: linear-gradient(90deg, #6366f1, #10b981);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }

        .log-container {
            background-color: #06090f;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 24px;
        }

        .log-entry {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            padding-bottom: 4px;
        }

        .log-entry.info { color: #f8fafc; }
        .log-entry.success { color: #34d399; }
        .log-entry.error { color: #f87171; }
        .log-entry.warning { color: #fbbf24; }
        .log-entry.timestamp { color: #64748b; font-size: 0.8rem; margin-right: 8px; }

        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .console-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: underline;
        }

        .clear-btn:hover {
            color: var(--text);
        }
    </style>
    <!-- Load main DB implementation -->
    <script src="db.js"></script>
</head>
<body>

    <h1>POS DATA SAFETY & SCALE STRESS TEST</h1>
    <p class="subtitle">Validating Database Persistence and latency with 4,000 Products and 5,000 Bills</p>

    <div class="card">
        <div class="button-group">
            <button id="btn-start" class="btn" onclick="startTest()">Start Scale Test</button>
            <button id="btn-reset" class="btn" style="background-color: var(--error); display: none;" onclick="resetTestState()">Reset Test & DB</button>
        </div>

        <div class="status-container">
            <div class="stat-box">
                <div id="stat-state" class="stat-val warning">Idle</div>
                <div class="stat-label">Current State</div>
            </div>
            <div class="stat-box">
                <div id="stat-products" class="stat-val">0</div>
                <div class="stat-label">Product Count</div>
            </div>
            <div class="stat-box">
                <div id="stat-bills" class="stat-val">0</div>
                <div class="stat-label">Bill Count</div>
            </div>
            <div class="stat-box">
                <div id="stat-reloads" class="stat-val">0 / 100</div>
                <div class="stat-label">PWA Reloads</div>
            </div>
            <div class="stat-box">
                <div id="stat-status" class="stat-val success">PASS</div>
                <div class="stat-label">Data Status</div>
            </div>
        </div>

        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div class="console-header">
            <span class="console-title">TEST EXECUTION CONSOLE</span>
            <button class="clear-btn" onclick="clearLogs()">Clear Console</button>
        </div>
        <div id="log-console" class="log-container">
            <div class="log-entry info">Harness initialized. Click 'Start Scale Test' to begin.</div>
        </div>
    </div>

    <script>
        const TARGET_PRODUCTS_COUNT = 4000;
        const TARGET_BILLS_COUNT = 5000;
        const TARGET_RELOAD_COUNT = 100;
        
        // Define realistic generator lists
        const categories = ["Boys Wear", "Girls Wear", "Infants", "Accessories", "Footwear"];
        const names = [
            "Cotton Polo T-Shirt", "Summer Denim Frock", "Organic Romper Pack", "Canvas Casual Sneakers",
            "Wide Brim Straw Hat Pack", "Stretch Denim Shorts", "Premium Cotton Leggings", "Soft Sole Leather Sandals",
            "Ankle Socks 5-Pack", "Fleece Zipper Hoodie", "Knitted Button Cardigan", "Wool Booties Set",
            "UV400 Polarized Sunglasses", "Elastic Jogger Pants", "Pleated Skort", "Waterproof Feeding Bibs Pack",
            "Mini Nylon Backpack", "Leather Adjustable Belt", "Glitter Hairclips Set", "Lace Detail Socks"
        ];
        const colors = ["Navy Blue", "Crimson Red", "Forest Green", "Sun Yellow", "Coral Orange", "Blush Pink", "Lavender Purple", "Snow White", "Coal Black", "Charcoal Grey", "Olive Green", "Mustard Yellow"];
        const sizesList = ["1-2Y", "2-3Y", "3-4Y", "4-5Y", "5-6Y", "6-7Y", "7-8Y", "M", "L", "S", "Standard"];

        // State keys in localStorage
        const STATE_KEY = "stress_test_state";
        const RELOAD_COUNT_KEY = "stress_test_reload_count";
        const ORIGINAL_COUNT_KEY = "stress_test_original_count";
        const ORIGINAL_BILLS_KEY = "stress_test_original_bills";
        const LOGS_KEY = "stress_test_logs";

        function log(message, type = "info") {
            const consoleEl = document.getElementById('log-console');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            const timestamp = document.createElement('span');
            timestamp.className = 'log-entry timestamp';
            timestamp.innerText = new Date().toLocaleTimeString();

            entry.appendChild(timestamp);
            const msgSpan = document.createElement('span');
            msgSpan.innerText = message;
            entry.appendChild(msgSpan);

            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;

            // Save to localStorage logs to persist across refreshes
            const savedLogs = JSON.parse(localStorage.getItem(LOGS_KEY) || "[]");
            savedLogs.push({ time: new Date().toLocaleTimeString(), message, type });
            localStorage.setItem(LOGS_KEY, JSON.stringify(savedLogs));
        }

        function clearLogs() {
            document.getElementById('log-console').innerHTML = '';
            localStorage.setItem(LOGS_KEY, JSON.stringify([]));
        }

        function restoreSavedLogs() {
            const consoleEl = document.getElementById('log-console');
            consoleEl.innerHTML = '';
            const savedLogs = JSON.parse(localStorage.getItem(LOGS_KEY) || "[]");
            savedLogs.forEach(l => {
                const entry = document.createElement('div');
                entry.className = `log-entry ${l.type}`;
                
                const timestamp = document.createElement('span');
                timestamp.className = 'log-entry timestamp';
                timestamp.innerText = l.time;

                entry.appendChild(timestamp);
                const msgSpan = document.createElement('span');
                msgSpan.innerText = l.message;
                entry.appendChild(msgSpan);

                consoleEl.appendChild(entry);
            });
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Generate high fidelity realistic products
        function generateProduct(index) {
            const code = `KID-PROD-${String(index).padStart(4, '0')}`;
            const category = categories[index % categories.length];
            const color = colors[index % colors.length];
            const baseName = names[(index * 3) % names.length];
            const name = `${color} ${baseName}`;

            // Create 1 to 3 sizes
            const sizeCount = (index % 3) + 1;
            const sizes = [];
            for (let i = 0; i < sizeCount; i++) {
                const sizeVal = sizesList[(index + i) % sizesList.length];
                const price = 299 + ((index * 7 + i * 50) % 25) * 50; // Pricing spread: ₹299 - ₹1499
                const stock = 5 + ((index * 13 + i * 17) % 45); // Stock levels: 5 - 50 units
                sizes.push({ size: sizeVal, price, stock });
            }

            return { code, name, category, sizes };
        }

        // Initialize DB helper with clean slate, seeding products and bills via transaction
        async function wipeAndSeedDB() {
            log(`Opening IndexedDB and preparing to clear database stores...`, "info");
            const db = await initDB();
            
            log(`Clearing all object stores transactional...`, "warning");
            const wipeTx = db.transaction(['settings', 'products', 'bills', 'deleted_bills', 'audit_logs'], 'readwrite');
            wipeTx.objectStore('settings').clear();
            wipeTx.objectStore('products').clear();
            wipeTx.objectStore('bills').clear();
            wipeTx.objectStore('deleted_bills').clear();
            wipeTx.objectStore('audit_logs').clear();
            
            await new Promise((resolve, reject) => {
                wipeTx.oncomplete = () => resolve();
                wipeTx.onerror = () => reject(wipeTx.error);
            });
            log("Database stores cleared successfully.", "success");

            // Seed products
            log(`Writing ${TARGET_PRODUCTS_COUNT} products to IndexedDB...`, "info");
            let transaction = db.transaction('products', 'readwrite');
            let store = transaction.objectStore('products');
            for (let i = 1; i <= TARGET_PRODUCTS_COUNT; i++) {
                const prod = generateProduct(i);
                store.put(prod);
            }
            await new Promise((resolve, reject) => {
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
            log(`Successfully seeded ${TARGET_PRODUCTS_COUNT} products!`, "success");

            // Seed bills with completely unique keys using a daily sequence suffix map
            log(`Writing ${TARGET_BILLS_COUNT} historical bills to IndexedDB...`, "info");
            transaction = db.transaction('bills', 'readwrite');
            store = transaction.objectStore('bills');

            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            const dateSequenceMap = {};

            for (let i = 1; i <= TARGET_BILLS_COUNT; i++) {
                const billDate = new Date(now - (i % 180) * oneDay); // Spread over 180 days (6 months)
                const DD = String(billDate.getDate()).padStart(2, '0');
                const MM = String(billDate.getMonth() + 1).padStart(2, '0');
                const YY = String(billDate.getFullYear()).slice(-2);
                const dateKey = `${DD}${MM}${YY}`;
                
                // Suffix is unique per day
                dateSequenceMap[dateKey] = (dateSequenceMap[dateKey] || 0) + 1;
                const suffix = String(dateSequenceMap[dateKey]).padStart(4, '0');
                const billId = `${dateKey}${suffix}`;

                const billRecord = {
                    id: billId,
                    date: `${DD}-${MM}-${billDate.getFullYear()}`,
                    time: "12:00 PM",
                    dateTimestamp: billDate.getTime(),
                    items: [
                        { code: `KID-PROD-0001`, name: "Navy Blue Cotton Polo T-Shirt", size: "M", price: 299, qty: 1, total: 299 }
                    ],
                    subtotal: 299,
                    discountType: "none",
                    discountValue: 0,
                    discountAmount: 0,
                    gstPercent: 0,
                    gstAmount: 0,
                    grandTotal: 299,
                    paymentMode: i % 2 === 0 ? "Cash" : "UPI",
                    customerMobile: "9988776655",
                    cashier: "Irfan"
                };
                store.put(billRecord);
            }

            return new Promise((resolve, reject) => {
                transaction.oncomplete = () => {
                    log(`Successfully seeded ${TARGET_BILLS_COUNT} unique historical bills!`, "success");
                    resolve();
                };
                transaction.onerror = () => reject(transaction.error);
            });
        }

        // Main engine loop running across reloads
        async function runLifecycle() {
            restoreSavedLogs();
            const state = localStorage.getItem(STATE_KEY) || "idle";
            const reloadCount = parseInt(localStorage.getItem(RELOAD_COUNT_KEY) || "0");

            // Update UI elements based on state
            document.getElementById('stat-state').innerText = state.toUpperCase();
            document.getElementById('stat-reloads').innerText = `${reloadCount} / ${TARGET_RELOAD_COUNT}`;
            
            if (state === "idle") {
                document.getElementById('btn-start').style.display = 'inline-block';
                document.getElementById('btn-reset').style.display = 'none';
                return;
            }

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-reset').style.display = 'inline-block';

            let currentProducts = 0;
            let currentBills = 0;
            let queryTimeProducts = 0;
            let queryTimeBills = 0;

            try {
                // Measure product query time
                const t0 = performance.now();
                const dbProducts = await getAllProducts();
                currentProducts = dbProducts.length;
                queryTimeProducts = performance.now() - t0;

                // Measure bills query time
                const t1 = performance.now();
                const dbBills = await getAllBills();
                currentBills = dbBills.length;
                queryTimeBills = performance.now() - t1;

                document.getElementById('stat-products').innerText = currentProducts;
                document.getElementById('stat-bills').innerText = currentBills;
            } catch (e) {
                log(`Failed to fetch records from IndexedDB: ${e.message}`, "error");
                document.getElementById('stat-status').innerText = "FAIL";
                document.getElementById('stat-status').className = "stat-val error";
                localStorage.setItem(STATE_KEY, "error");
                await sendResults("error");
                return;
            }

            if (state === "reloading") {
                // Assert product and bills counts are still correct
                const expectedProducts = parseInt(localStorage.getItem(ORIGINAL_COUNT_KEY));
                const expectedBills = parseInt(localStorage.getItem(ORIGINAL_BILLS_KEY));

                if (currentProducts !== expectedProducts || currentBills !== expectedBills) {
                    log(`DATA LOSS DETECTED at reload step ${reloadCount}!`, "error");
                    log(`Products Expected: ${expectedProducts}, Got: ${currentProducts}`, "error");
                    log(`Bills Expected: ${expectedBills}, Got: ${currentBills}`, "error");
                    document.getElementById('stat-status').innerText = "FAIL";
                    document.getElementById('stat-status').className = "stat-val error";
                    localStorage.setItem(STATE_KEY, "error");
                    await sendResults("error");
                    return;
                }

                // Update progress bar
                const pct = Math.min(100, (reloadCount / TARGET_RELOAD_COUNT) * 100);
                document.getElementById('progress-bar').style.width = `${pct}%`;

                if (reloadCount < TARGET_RELOAD_COUNT) {
                    log(`Refreshed ${reloadCount} times. DB validated: ${currentProducts} products (${queryTimeProducts.toFixed(1)}ms), ${currentBills} bills (${queryTimeBills.toFixed(1)}ms). Reloading...`, "success");
                    localStorage.setItem(RELOAD_COUNT_KEY, reloadCount + 1);
                    setTimeout(() => location.reload(), 15); // 15ms throttle for UI visibility
                } else {
                    log(`Completed all ${TARGET_RELOAD_COUNT} reloads successfully. No data loss observed. Latency checks passed. Proceeding to CRUD tests...`, "success");
                    localStorage.setItem(STATE_KEY, "crud_testing");
                    setTimeout(() => runLifecycle(), 500);
                }
            } else if (state === "crud_testing") {
                document.getElementById('progress-bar').style.width = `100%`;
                await runCRUDAndBillingTests(currentProducts, currentBills);
            }
        }

        async function startTest() {
            localStorage.clear();
            clearLogs();
            log("Initializing Safety & Scale Stress Test (4,000 Products, 5,000 Bills)...");
            
            try {
                // State change
                localStorage.setItem(STATE_KEY, "seeding");
                document.getElementById('btn-start').disabled = true;
                
                await wipeAndSeedDB();
                
                // Set state configurations
                localStorage.setItem(STATE_KEY, "reloading");
                localStorage.setItem(RELOAD_COUNT_KEY, "1");
                localStorage.setItem(ORIGINAL_COUNT_KEY, String(TARGET_PRODUCTS_COUNT));
                localStorage.setItem(ORIGINAL_BILLS_KEY, String(TARGET_BILLS_COUNT));
                
                log("Starting 100 automated refreshes with loaded database...", "info");
                
                // Preserve the auto=true query param in reloads to allow tracking
                const url = new URL(window.location.href);
                url.searchParams.set('auto', 'true');
                window.history.replaceState({}, '', url);

                setTimeout(() => location.reload(), 500);

            } catch (e) {
                log(`Seeding failed: ${e.message}`, "error");
                localStorage.setItem(STATE_KEY, "idle");
                document.getElementById('btn-start').disabled = false;
            }
        }

        async function resetTestState() {
            localStorage.clear();
            clearLogs();
            // Clear stores
            try {
                const db = await initDB();
                const transaction = db.transaction(['settings', 'products', 'bills', 'deleted_bills', 'audit_logs'], 'readwrite');
                transaction.objectStore('settings').clear();
                transaction.objectStore('products').clear();
                transaction.objectStore('bills').clear();
                transaction.objectStore('deleted_bills').clear();
                transaction.objectStore('audit_logs').clear();
                await new Promise((resolve, reject) => {
                    transaction.oncomplete = () => resolve();
                    transaction.onerror = () => reject(transaction.error);
                });
                log("Database stores cleared.", "info");
            } catch (e) {
                log(`Reset failed: ${e.message}`, "error");
            }
            setTimeout(() => {
                const url = new URL(window.location.href);
                url.searchParams.delete('auto');
                window.location.href = url.pathname;
            }, 500);
        }

        async function runCRUDAndBillingTests(startCount, startBills) {
            log("Starting Phase 3: Scale Database CRUD & Billing Assertions...", "warning");
            let expectedCount = startCount;
            let expectedBills = startBills;

            try {
                // 1. Search products
                log(`Executing product searches against 4,000 items...`, "info");
                const search1 = await getAllProducts();
                const matched = search1.filter(p => p.name.includes("Navy Blue"));
                log(`Search matches found: ${matched.length} items. Product count stable.`, "success");
                assert(search1.length === expectedCount, `Search changed product count from ${expectedCount} to ${search1.length}`);

                // 2. Edit products
                log(`Modifying 100 product prices & stocks in bulk...`, "info");
                const productsToEdit = search1.slice(0, 100);
                for (const p of productsToEdit) {
                    p.sizes.forEach(s => {
                        s.price += 10;
                        s.stock += 5;
                    });
                    await saveProduct(p);
                }
                const afterEditList = await getAllProducts();
                log(`Successfully updated 100 products. Asserting product count...`, "success");
                assert(afterEditList.length === expectedCount, `Editing changed product count! Expected: ${expectedCount}, Got: ${afterEditList.length}`);

                // 3. Delete some products
                const deleteCount = 50;
                log(`Deleting ${deleteCount} products from the inventory database...`, "info");
                const productsToDelete = afterEditList.slice(expectedCount - deleteCount);
                for (const p of productsToDelete) {
                    await deleteProduct(p.code);
                }
                expectedCount -= deleteCount;
                const afterDeleteList = await getAllProducts();
                log(`Successfully deleted ${deleteCount} products. Count remaining: ${afterDeleteList.length} (Expected: ${expectedCount})`, "success");
                assert(afterDeleteList.length === expectedCount, `Deleting products changed count! Expected: ${expectedCount}, Got: ${afterDeleteList.length}`);
                document.getElementById('stat-products').innerText = afterDeleteList.length;

                // 4. Generate bills (Transactions)
                const transactionCount = 20;
                log(`Generating ${transactionCount} new customer sales bills concurrently...`, "info");
                const activeProducts = afterDeleteList.slice(0, transactionCount);
                for (let i = 0; i < transactionCount; i++) {
                    const prod = activeProducts[i];
                    const sizeObj = prod.sizes[0];
                    const cart = [
                        { code: prod.code, name: prod.name, size: sizeObj.size, price: sizeObj.price, qty: 1 }
                    ];
                    await createBill(cart, { type: 'none', value: 0 }, 'UPI', '9988776655', 'Irfan');
                }
                expectedBills += transactionCount;
                const afterBillingList = await getAllProducts();
                const allBills = await getAllBills();
                log(`Successfully created ${transactionCount} transactions. Verified stock deducted. Bills logged in DB: ${allBills.length}`, "success");
                assert(afterBillingList.length === expectedCount, `Billing changed inventory count! Expected: ${expectedCount}, Got: ${afterBillingList.length}`);
                assert(allBills.length === expectedBills, `Billing count mismatch! Expected: ${expectedBills}, Got: ${allBills.length}`);
                document.getElementById('stat-bills').innerText = allBills.length;

                // 5. Export and Import database verification
                log(`Exporting entire database (Settings, Inventory, ${expectedBills} Bills, Logs) to JSON backup...`, "info");
                const backupJSON = await exportBackupJSON();
                const backupData = JSON.parse(backupJSON);
                log(`Export complete. Backup contains ${backupData.products.length} products and ${backupData.bills.length} bills.`, "success");
                assert(backupData.products.length === expectedCount, `Backup export mismatch! Expected: ${expectedCount}, Got: ${backupData.products.length}`);
                assert(backupData.bills.length === expectedBills, `Backup export mismatch! Expected: ${expectedBills}, Got: ${backupData.bills.length}`);

                log(`Simulating database restore from JSON backup file...`, "info");
                await restoreBackupJSON(backupJSON);
                
                const afterImportList = await getAllProducts();
                const afterImportBills = await getAllBills();
                log(`Restore complete. Asserting count alignment...`, "success");
                assert(afterImportList.length === expectedCount, `Restore backup changed product count! Expected: ${expectedCount}, Got: ${afterImportList.length}`);
                assert(afterImportBills.length === expectedBills, `Restore backup changed bills count! Expected: ${expectedBills}, Got: ${afterImportBills.length}`);
                
                log(`STRESS TEST COMPLETED SUCCESSFULLY! No records were lost. Database is 100% consistent across all operations at scale.`, "success");
                document.getElementById('stat-state').innerText = "SUCCESS";
                document.getElementById('stat-state').className = "stat-val success";
                localStorage.setItem(STATE_KEY, "completed");

                await sendResults("completed");

            } catch (err) {
                log(`FAIL: Test suite aborted due to assertion failure: ${err.message}`, "error");
                document.getElementById('stat-status').innerText = "FAIL";
                document.getElementById('stat-status').className = "stat-val error";
                localStorage.setItem(STATE_KEY, "error");
                
                await sendResults("error");
            }
        }

        async function sendResults(status) {
            log(`Sending results to server...`, "info");
            const logs = JSON.parse(localStorage.getItem(LOGS_KEY) || "[]");
            const data = {
                status: status,
                reloadCount: parseInt(localStorage.getItem(RELOAD_COUNT_KEY) || "0"),
                productCount: parseInt(document.getElementById('stat-products').innerText || "0"),
                billCount: parseInt(document.getElementById('stat-bills').innerText || "0"),
                logs: logs
            };
            try {
                await fetch('/submit-results', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                log(`Results sent successfully. Server will shut down.`, "success");
            } catch (e) {
                log(`Failed to send results to server: ${e.message}`, "error");
            }
        }

        function assert(condition, message) {
            if (!condition) {
                throw new Error(message || "Assertion failed");
            }
        }

        // Trigger on load
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const state = localStorage.getItem(STATE_KEY) || "idle";
            
            if (urlParams.get('auto') === 'true' && (state === 'idle' || state === 'completed' || state === 'error')) {
                // Force a fresh test start by clearing storage and launching startTest
                localStorage.clear();
                log("Forcing a fresh test run via auto-start query param...", "warning");
                setTimeout(() => startTest(), 1000);
            } else {
                runLifecycle();
            }
        });
    </script>
</body>
</html>
